name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run contracts:compile
      - run: npm run contracts:test

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # A real DATABASE_URL isn't needed to build — Prisma only needs the
      # schema to generate a client, and every DB-touching route is
      # dynamic (server-rendered on demand), never executed at build time.
      - run: npx prisma generate
      - run: npx next build
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/finflow"
